<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Comparison Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <header>
            <h1>AI Response Comparator</h1>
            <p>Enter a prompt to compare responses from 3 different AI models.</p>
        </header>

        <div class="input-section">
            <input type="text" id="promptInput" placeholder="Type your prompt here (e.g., 'Write a haiku about code')" />
            <button id="submitBtn">Compare AIs</button>
        </div>

        <div id="loading" class="loading-container hidden">
            <div class="spinner"></div>
            <p>Fetching responses...</p>
        </div>

        <div class="results-grid" id="resultsContainer">
            <!-- Cards will be injected here by JavaScript -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
